version: "3.8"

services:
  vpn-alarm:
    image: ghcr.io/cangshui/vpn_alarm:latest
    container_name: vpn-alarm
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # 挂载配置文件，用户可直接编辑或通过 Web 后台修改
      - ./config.json:/app/config.json
      # 持久化数据目录（数据库文件自动创建在其中），容器重启后数据不丢失
      - ./data:/app/data
      # 持久化日志文件，容器内写到 /app/logs，宿主机可直接查看
      - ./logs:/app/logs
      # GeoLite2-City.mmdb 也可按需挂载自定义版本
      # - ./GeoLite2-City.mmdb:/app/GeoLite2-City.mmdb
