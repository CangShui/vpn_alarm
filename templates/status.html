{% extends "base.html" %}
{% block title %}当前状态{% endblock %}
{% block content %}

<div class="section">
    <h2>服务器在线状态 <span style="font-size:13px; font-weight:normal; color:#888;" id="refresh-indicator"></span></h2>
    <div style="margin-bottom: 10px;">
        <button onclick="manualScan()" id="scan-btn" style="padding:8px 16px; font-size:14px; cursor:pointer;">立即采集</button>
        <span id="scan-hint" style="margin-left: 10px; color: #666; font-size: 13px;"></span>
    </div>

    <div id="server-status-area">
        <div class="card" style="text-align: center; color: #999;">
            <p>正在加载...</p>
        </div>
    </div>
</div>

<div class="section">
    <h2>城市解析器状态</h2>
    <div id="resolver-status-area">
        <div class="card" style="text-align: center; color: #999;">
            <p>正在加载...</p>
        </div>
    </div>
</div>

<div class="section">
    <h2>数据库统计</h2>
    <div id="db-stats-area">
        <div class="card" style="text-align: center; color: #999;">
            <p>正在加载...</p>
        </div>
    </div>
</div>

<script>
var AUTO_REFRESH_SEC = {{ status_refresh_interval or 5 }};
var refreshTimer = null;

function formatAge(seconds) {
    if (seconds === null || seconds === undefined) return '未知';
    if (seconds < 60) return seconds + '秒';
    if (seconds < 3600) return Math.floor(seconds / 60) + '分' + (seconds % 60) + '秒';
    var h = Math.floor(seconds / 3600);
    var m = Math.floor((seconds % 3600) / 60);
    return h + '时' + m + '分';
}

function loadStatus() {
    fetch('/api/status')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data.ok) return;
            renderServers(data);
            renderResolvers(data.resolver_status);
            renderDbStats(data.db_stats);
            // 若服务器端间隔变化，重启定时器
            var newInterval = data.refresh_interval || 5;
            if (newInterval !== AUTO_REFRESH_SEC) {
                AUTO_REFRESH_SEC = newInterval;
                if (refreshTimer) clearInterval(refreshTimer);
                refreshTimer = setInterval(loadStatus, AUTO_REFRESH_SEC * 1000);
            }
            document.getElementById('refresh-indicator').textContent =
                '(自动刷新，间隔 ' + AUTO_REFRESH_SEC + ' 秒)';
        })
        .catch(function(e) {
            console.error('Status load error:', e);
        });
}

function renderServers(data) {
    var container = document.getElementById('server-status-area');
    if (!data.servers || data.servers.length === 0) {
        container.innerHTML = '<div class="card" style="text-align: center; color: #999;"><p>暂无采集数据，请点击「立即采集」按钮或等待定时采集。</p></div>';
        return;
    }

    var html = '';
    data.servers.forEach(function(rec) {
        var statusClass = rec.status === 'success' ? 'badge-ok' : 'badge-err';
        var statusText = rec.status === 'success' ? '正常' : '异常';

        html += '<div class="card server-card">';
        html += '<div class="server-header">';
        html += '<span class="server-name">' + escapeHtml(rec.server) + '</span>';
        html += '<span class="server-type">[' + escapeHtml(rec.type) + ']</span>';
        html += '<span class="status-badge ' + statusClass + '">' + statusText + '</span>';
        html += '<span class="scan-time">采集时间: ' + escapeHtml(rec.scan_time) + '</span>';
        html += '</div>';
        html += '<div class="server-body">';
        html += '<div class="info-row"><span class="info-label">在线客户端:</span><span class="info-value">' + rec.online_count + '</span></div>';
        html += '<div class="info-row"><span class="info-label">耗时:</span><span class="info-value">' + rec.duration_ms + 'ms</span></div>';

        if (rec.error_message) {
            html += '<div class="info-row error-text"><span class="info-label">错误:</span><span class="info-value" style="white-space:pre-wrap">' + escapeHtml(rec.error_message) + '</span></div>';
        }

        if (rec.client_details && rec.client_details.length > 0) {
            html += '<div style="margin-top:10px;"><strong>客户端详情:</strong>';
            html += '<table class="geo-table"><thead><tr>';
            html += '<th>IP 地址</th><th>连接时长</th><th>接入时间</th><th>城市</th><th>地区</th><th>国家</th><th>数据来源</th>';
            html += '</tr></thead><tbody>';

            rec.client_details.forEach(function(d) {
                var geo = rec.geo_data && rec.geo_data[d.ip] ? rec.geo_data[d.ip] : {};
                html += '<tr>';
                html += '<td><code>' + escapeHtml(d.ip) + '</code></td>';
                html += '<td>' + formatAge(d.connected_seconds) + '</td>';
                html += '<td>' + escapeHtml(d.connected_since || '-') + '</td>';
                html += '<td>' + (geo.city && geo.city !== '-' ? escapeHtml(geo.city) : '-') + '</td>';
                html += '<td>' + (geo.region && geo.region !== '-' ? escapeHtml(geo.region) : '-') + '</td>';
                html += '<td>' + (geo.country && geo.country !== '-' ? escapeHtml(geo.country) : '-') + '</td>';
                html += '<td>' + (geo.source || '-') + '</td>';
                html += '</tr>';
            });

            html += '</tbody></table></div>';
        }

        html += '</div></div>';
    });

    container.innerHTML = html;
}

function renderResolvers(resolvers) {
    var container = document.getElementById('resolver-status-area');
    if (!resolvers || resolvers.length === 0) {
        container.innerHTML = '<div class="card" style="text-align: center; color: #999;"><p>无解析器</p></div>';
        return;
    }
    var html = '';
    resolvers.forEach(function(r) {
        html += '<div class="card" style="margin-bottom:8px; padding:10px 16px;">';
        html += '<strong>' + escapeHtml(r.name) + '</strong> ';
        if (r.available) {
            html += '<span class="status-badge badge-ok">可用</span>';
            html += ' <span style="font-size:12px; color:#888;">文件: ' + escapeHtml(r.file || '') + '</span>';
        } else {
            html += '<span class="status-badge badge-warn">不可用</span>';
            html += ' <span style="color:#e67e22; font-size:13px; margin-left:6px; white-space:pre-wrap">' + escapeHtml(r.error || '') + '</span>';
        }
        html += '</div>';
    });
    html += '<p style="font-size:13px; color:#888; margin-top:8px;">提示：若需 IP 城市定位，请确保 GeoLite2-City.mmdb 文件存在于项目目录。</p>';
    container.innerHTML = html;
}

function renderDbStats(stats) {
    var container = document.getElementById('db-stats-area');
    if (!stats) {
        container.innerHTML = '<div class="card" style="text-align: center; color: #999;"><p>无统计</p></div>';
        return;
    }
    container.innerHTML = '<div class="card" style="padding:10px 16px;">扫描记录: <strong>' + stats.scan_count + '</strong> 条 &nbsp;|&nbsp; 事件记录: <strong>' + stats.event_count + '</strong> 条</div>';
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function manualScan() {
    var btn = document.getElementById('scan-btn');
    var hint = document.getElementById('scan-hint');
    btn.disabled = true;
    btn.textContent = '采集中...';
    hint.textContent = '';
    fetch('/api/scan', {method: 'POST'})
        .then(function(r) { return r.json(); })
        .then(function(data) {
            btn.textContent = '立即采集';
            btn.disabled = false;
            if (data.ok) {
                hint.textContent = '采集完成，正在刷新...';
                hint.style.color = 'green';
                loadStatus();
                setTimeout(function(){ hint.textContent = ''; }, 3000);
            } else {
                hint.textContent = '采集失败: ' + (data.error || '未知错误');
                hint.style.color = 'red';
            }
        })
        .catch(function(e) {
            btn.textContent = '立即采集';
            btn.disabled = false;
            hint.textContent = '请求失败: ' + e.message;
            hint.style.color = 'red';
        });
}

// 页面加载时启动自动刷新
loadStatus();
refreshTimer = setInterval(loadStatus, AUTO_REFRESH_SEC * 1000);

</script>

{% endblock %}
